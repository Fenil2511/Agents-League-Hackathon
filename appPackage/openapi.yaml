openapi: 3.0.3
info:
  title: CompliYUG Compliance Backend API
  description: >
    Live compliance analysis backend for the DPDP Act 2023 and ISO/IEC 27001:2022.
    Exposes endpoints for PII classification, gap analysis, breach notification workflow,
    audit report generation, and dashboard statistics. Backed by Microsoft Graph for
    M365 content ingestion and Azure AI Foundry for risk scoring.
  version: 1.0.0
  contact:
    name: CompliYUG
servers:
  - url: https://compliyug-api.azurewebsites.net
    description: Azure App Service (production deployment)
  - url: http://localhost:3000
    description: Local development
paths:
  /api/health:
    get:
      operationId: healthCheck
      summary: Service health check
      description: Returns service readiness status and current timestamp.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /api/classify:
    post:
      operationId: classifyDocument
      summary: Classify document content for PII and compliance risk
      description: >
        Detects Indian PII patterns (Aadhaar, PAN, passport, credit card, phone, email,
        IFSC, GSTIN) and sensitive keywords in the provided text. Returns a classification
        label (PUBLIC / INTERNAL / CONFIDENTIAL / RESTRICTED), risk score 0-100, masked
        PII samples, and applicable DPDP Act obligations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: Document or message content to classify for PII and compliance risk
                source:
                  type: string
                  description: Source location (e.g. "HR SharePoint", "Outlook inbox")
                sendTeamsAlert:
                  type: boolean
                  description: Send a Teams alert if PII is detected and risk score >= 40
                  default: false
      responses:
        '200':
          description: Classification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationResult'
        '400':
          description: Missing required field
        '500':
          description: Server error

  /api/gap-analysis:
    post:
      operationId: runGapAnalysis
      summary: Run ISO 27001 and DPDP Act gap analysis on policy text
      description: >
        Analyses a policy document against 47 ISO 27001:2022 Annex A controls and 17
        DPDP Act 2023 requirements using keyword corpus matching. Returns compliance
        percentages, identified gaps, critical missing controls, and remediation steps
        for each gap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyText:
                  type: string
                  description: Policy or procedure document text to analyse
                evidenceItems:
                  type: array
                  description: Optional additional evidence items (titles and previews from M365)
                  items:
                    type: object
                    properties:
                      title:
                        type: string
                      preview:
                        type: string
                sendTeamsAlert:
                  type: boolean
                  description: Alert Teams when critical gaps are found
                  default: false
      responses:
        '200':
          description: Gap analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GapAnalysisResult'
        '500':
          description: Server error

  /api/breach/notify:
    post:
      operationId: fileBreachNotification
      summary: File a DPDP Act Section 40 breach notification (72-hour SLA workflow)
      description: >
        Initiates the DPDP Act Section 40 breach notification workflow. Calculates the
        72-hour reporting deadline from the detection timestamp, generates board initial
        alert artifacts and data principal notification templates, and optionally dispatches
        a Teams alert card and emails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BreachPayload'
      responses:
        '200':
          description: Breach notification result with all dispatch statuses and generated artifacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreachResult'
        '500':
          description: Server error

  /api/dashboard:
    get:
      operationId: getDashboardStats
      summary: Get compliance dashboard statistics and recent activity
      description: >
        Returns aggregated KPIs from all in-session activity: total scans, average risk
        score, overall compliance percentage, critical gap count, and a chronological
        activity feed.
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /api/audit-report:
    get:
      operationId: getAuditReport
      summary: Generate a compliance audit report from all activity
      description: >
        Generates a structured JSON audit report from all in-session scans, classifications,
        gap analyses, and breach notifications. Includes executive summary, ISO 27001 compliance
        summary, DPDP compliance summary, data classification summary, and prioritised
        recommendations.
      responses:
        '200':
          description: Audit report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditReport'

components:
  schemas:
    ClassificationResult:
      type: object
      properties:
        classificationLabel:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
          description: Assigned data classification label
        riskScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Risk score 0-100
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        totalPiiInstances:
          type: integer
          description: Total number of PII instances detected
        piiFindings:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              maskedValue:
                type: string
              severity:
                type: string
        sensitiveKeywords:
          type: array
          items:
            type: string
        recommendedActions:
          type: array
          items:
            type: string
        dpdpObligations:
          type: array
          items:
            type: string
          description: Applicable DPDP Act sections triggered by findings

    GapAnalysisResult:
      type: object
      properties:
        overallCompliancePercent:
          type: integer
        iso27001:
          type: object
          properties:
            total:
              type: integer
            compliant:
              type: integer
            gaps:
              type: integer
            compliancePercent:
              type: integer
            controls:
              type: array
              items:
                type: object
        dpdp:
          type: object
          properties:
            total:
              type: integer
            compliant:
              type: integer
            gaps:
              type: integer
            compliancePercent:
              type: integer
            requirements:
              type: array
              items:
                type: object
        criticalGaps:
          type: array
          description: Controls/requirements flagged as critical that are not met
          items:
            type: object

    BreachPayload:
      type: object
      required:
        - natureOfBreach
        - extentOfBreach
      properties:
        natureOfBreach:
          type: string
          description: Description of what happened (e.g. "Unauthorised access to employee records")
        extentOfBreach:
          type: string
          description: Scope of data affected (e.g. "850 employee records including Aadhaar and PAN")
        timing:
          type: string
          description: ISO 8601 timestamp of when the breach was detected
          format: date-time
        location:
          type: string
          description: System or location where the breach occurred
        likelyImpact:
          type: string
          description: Potential consequences for data principals
        sendTeamsAlert:
          type: boolean
          description: Send a red Teams MessageCard to the compliance channel
          default: true
        sendBoardEmail:
          type: boolean
          description: Email the Data Protection Board contact
          default: false
        sendDataPrincipalEmails:
          type: boolean
          description: Email affected data principals
          default: false
        dataPrincipalEmails:
          type: array
          items:
            type: string
            format: email

    BreachResult:
      type: object
      properties:
        workflow:
          type: string
        detectedAt:
          type: string
        reportDeadline:
          type: string
        hoursRemaining:
          type: number
        initialAlertRequiredNow:
          type: boolean
        dispatch:
          type: object
          properties:
            teamsAlert:
              type: object
            boardMail:
              type: object
            dataPrincipalMail:
              type: object
        artifacts:
          type: object

    DashboardStats:
      type: object
      properties:
        totalScans:
          type: integer
        totalClassifications:
          type: integer
        totalGapAnalyses:
          type: integer
        totalBreachNotifications:
          type: integer
        avgRiskScore:
          type: number
        overallCompliancePercent:
          type: number
        criticalGapsCount:
          type: integer
        recentActivity:
          type: array
          items:
            type: object

    AuditReport:
      type: object
      properties:
        reportId:
          type: string
        generatedAt:
          type: string
        orgName:
          type: string
        executiveSummary:
          type: object
        isoCompliance:
          type: object
        dpdpCompliance:
          type: object
        dataClassification:
          type: object
        topRecommendations:
          type: array
          items:
            type: string
        disclaimer:
          type: string
